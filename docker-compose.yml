services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - TZ=America/Los_Angeles
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      - backend-data:/data
      - photos-cache:/data/photos
      - ./.env:/app/.env
    networks:
      - gboard

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_SOBRIETY_DATE=${SOBRIETY_DATE}
        - VITE_BACKEND_URL=http://localhost:${BACKEND_PORT:-3001}
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - gboard

  # ── Test runners (docker compose run --rm --build backend-test npm test) ──
  backend-test:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: test
    profiles: [test]
    environment:
      - NODE_ENV=test

  frontend-test:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: test
    profiles: [test]
    environment:
      - NODE_ENV=test

volumes:
  backend-data:
  photos-cache:

networks:
  gboard:
    driver: bridge
