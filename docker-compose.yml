services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - TZ=America/Los_Angeles
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      - backend-data:/data
      - photos-cache:/data/photos
      - ./.env:/app/.env
    networks:
      - gboard

  thumbor:
    image: minimalcompact/thumbor:6.7.5
    restart: unless-stopped
    environment:
      - LOADER=thumbor.loaders.file_loader
      - FILE_LOADER_ROOT_PATH=/data/photos
      - ALLOW_UNSAFE_URL=True
      - DETECTORS=['thumbor.detectors.feature_detector','thumbor.detectors.face_detector']
      - RESULT_STORAGE=thumbor.result_storages.file_storage
      - RESULT_STORAGE_FILE_STORAGE_ROOT_PATH=/data/thumbor-cache
      - RESULT_STORAGE_STORES_UNSAFE=True
      - AUTO_WEBP=True
      - QUALITY=90
      - WEBP_QUALITY=90
      - RESPECT_ORIENTATION=True
      - PRESERVE_EXIF_INFO=False
      - MAX_AGE=604800
      - THUMBOR_NUM_PROCESSES=4
    volumes:
      - photos-cache:/data/photos:ro
      - thumbor-cache:/data/thumbor-cache
    networks:
      - gboard

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_SOBRIETY_DATE=${SOBRIETY_DATE}
        - VITE_BACKEND_URL=http://localhost:${BACKEND_PORT:-3001}
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:80"
    depends_on:
      - backend
      - thumbor
    networks:
      - gboard

  # ── Test runners (docker compose run --rm --build backend-test npm test) ──
  backend-test:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: test
    profiles: [test]
    environment:
      - NODE_ENV=test

  frontend-test:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: test
    profiles: [test]
    environment:
      - NODE_ENV=test

volumes:
  backend-data:
  photos-cache:
  thumbor-cache:

networks:
  gboard:
    driver: bridge
