name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint, Format & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Install backend deps
        run: npm ci
        working-directory: backend

      - name: ESLint (frontend)
        run: npm run lint
        working-directory: frontend

      - name: ESLint (backend)
        run: npm run lint
        working-directory: backend

      - name: Prettier check (frontend)
        run: npm run format:check
        working-directory: frontend

      - name: Prettier check (backend)
        run: npm run format:check
        working-directory: backend

      - name: TypeScript check (frontend)
        run: npm run typecheck
        working-directory: frontend

      - name: TypeScript check (backend)
        run: npm run typecheck
        working-directory: backend

      - name: Unit tests with coverage (backend)
        run: npx vitest run --coverage
        working-directory: backend

      - name: Unit tests with coverage (frontend)
        run: npx vitest run --coverage
        working-directory: frontend

      - name: Extract coverage percentages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: coverage
        run: |
          BE=$(node -e "const c=require('./backend/coverage/coverage-summary.json'); console.log(c.total.lines.pct)")
          FE=$(node -e "const c=require('./frontend/coverage/coverage-summary.json'); console.log(c.total.lines.pct)")
          echo "backend=$BE" >> "$GITHUB_OUTPUT"
          echo "frontend=$FE" >> "$GITHUB_OUTPUT"

      - name: Update backend coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: f09ac0dc7044ab52260ca7b473253927
          filename: backend-coverage.json
          label: backend coverage
          message: ${{ steps.coverage.outputs.backend }}%
          valColorRange: ${{ steps.coverage.outputs.backend }}
          minColorRange: 40
          maxColorRange: 90

      - name: Update frontend coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: f09ac0dc7044ab52260ca7b473253927
          filename: frontend-coverage.json
          label: frontend coverage
          message: ${{ steps.coverage.outputs.frontend }}%
          valColorRange: ${{ steps.coverage.outputs.frontend }}
          minColorRange: 40
          maxColorRange: 90

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build ./backend -t gboard-backend:ci

      - name: Build backend test image
        run: docker build ./backend --target test -t gboard-backend-test:ci

      - name: Build frontend image
        run: |
          docker build ./frontend \
            --build-arg VITE_SOBRIETY_DATE=2025-07-07T00:00:00 \
            --build-arg VITE_BACKEND_URL=http://localhost:3001 \
            -t gboard-frontend:ci

      - name: Build frontend test image
        run: docker build ./frontend --target test -t gboard-frontend-test:ci

      - name: Docker Compose build
        run: |
          cp .env.example .env
          docker compose build
