name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint, Format & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Install backend deps
        run: npm ci
        working-directory: backend

      - name: ESLint (frontend)
        run: npm run lint
        working-directory: frontend

      - name: ESLint (backend)
        run: npm run lint
        working-directory: backend

      - name: Prettier check (frontend)
        run: npm run format:check
        working-directory: frontend

      - name: Prettier check (backend)
        run: npm run format:check
        working-directory: backend

      - name: TypeScript check (frontend)
        run: npm run typecheck
        working-directory: frontend

      - name: TypeScript check (backend)
        run: npm run typecheck
        working-directory: backend

      - name: Unit tests (frontend)
        run: npm run test
        working-directory: frontend

      - name: Unit tests (backend)
        run: npm run test
        working-directory: backend

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build ./backend -t gboard-backend:ci

      - name: Build frontend image
        run: |
          docker build ./frontend \
            --build-arg VITE_SOBRIETY_DATE=2025-07-07T00:00:00 \
            --build-arg VITE_BACKEND_URL=http://localhost:3001 \
            -t gboard-frontend:ci

      - name: Docker Compose build
        run: |
          cp .env.example .env
          docker compose build
